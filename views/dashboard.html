<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OfficeChat Pro</title>

<link
rel="stylesheet"
href="/bootstrap/css/bootstrap.min.css">

<link
rel="stylesheet"
href="/css/dashboard.css">

</head>

<body>

<div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo">

            <h2>OfficeChat</h2>

            <span>PRO</span>

        </div>

        <nav class="nav-menu">

            <button
                id="navChats"
                class="nav-item active">

                💬 Chats

            </button>

            <button
                id="navEmployees"
                class="nav-item">

                👥 Employees

            </button>

            <button
                id="newGroupBtn"
                class="nav-item"
                onclick="openCreateGroupModal()">

                👥 New Group

            </button>

            <button
                id="adminNavBtn"
                class="nav-item"
                style="display:none;"
                onclick="toggleAdminPanel(true)">

                🛠 Admin Controls

            </button>

            <button
                id="navSettings"
                class="nav-item">

                ⚙ Settings

            </button>

        </nav>

        <div class="sidebar-footer">

            <div id="userinfo">

                Loading...

            </div>

            <button
                id="logoutBtn"
                class="logout-btn">

                Logout

            </button>

        </div>

    </aside>

    <!-- Employee Panel -->
    <section class="employee-panel">

        <div class="panel-header">

            <input
                type="text"
                id="searchInput"
                placeholder="Search employee...">

        </div>

        <ul
            class="employee-list"
            id="broadcastTab">

            <li
                class="list-group-item"
                onclick="selectBroadcastMode(this)">

                📢 Broadcast Announcement

            </li>

        </ul>

        <ul
            id="employeeList"
            class="employee-list">

        </ul>

        <div id="groupSection">

            <h5 style="padding:15px;">

                👥 Groups

            </h5>

            <ul
                id="groupList"
                class="employee-list">

            </ul>

        </div>

    </section>

    <!-- Chat Area -->
    <main class="chat-area">

        <div class="chat-header">

            <div class="chat-user">

                <div class="avatar">

                    👤

                </div>

                <div>

                    <h3 id="chatTitle">

                        Select Employee

                    </h3>

                    <small id="userStatus">

                        Offline

                    </small>

                </div>

            </div>

<div class="chat-search">

    <input
        type="text"
        id="chatSearch"
        placeholder="🔍 Search this chat...">

</div>

            <button
                id="manageGroupBtn"
                class="btn btn-warning"
                style="display:none;"
                onclick="openManageGroup()">

                ⚙ Manage Group

            </button>

        </div>

        <div
            id="chatMessages"
            class="chat-messages">

            <div class="welcome-screen">

                <h2>

                    Welcome to OfficeChat Pro

                </h2>

                <p>

                    Select an employee or group to begin chatting.

                </p>

            </div>

        </div>

        <div class="chat-input-area">

            <button class="tool-btn">

                😊

            </button>

            <input
                type="file"
                id="fileAttachmentInput"
                style="display:none"
                onchange="handleFileSelected(this)">

            <button
                class="tool-btn"
                onclick="triggerFileUpload()">

                📎

            </button>

            <input
                type="text"
                id="messageBox"
                placeholder="Type a message...">

            <button
                id="sendBtn"
                class="send-btn">

                Send

            </button>

        </div>

    </main>

</div>
<script src="/socket.io/socket.io.js"></script>

<script src="/js/dashboard.js"></script>

<script src="/js/groups.js"></script>

</body>
</html>
