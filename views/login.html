<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OfficeChat Pro - Login</title>

    <link href="/bootstrap/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container">

        <div class="row justify-content-center mt-5">

            <div class="col-md-4">

                <div class="card shadow">

                    <div class="card-header text-center">
                        <h3>OfficeChat Pro</h3>
                    </div>

                    <div class="card-body">

                        <form id="loginForm">

                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <input
                                    type="text"
                                    class="form-control"
                                    id="username"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input
                                    type="password"
                                    class="form-control"
                                    id="password"
                                    required>
                            </div>

                            <button
                                class="btn btn-primary w-100"
                                type="submit">
                                Login
                            </button>

                        </form>

                        <div
                            id="message"
                            class="mt-3 text-center text-danger">
                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="/js/login.js"></script>

</body>

</html>
